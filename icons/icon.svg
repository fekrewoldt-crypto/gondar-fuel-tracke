<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f2027"/>
    </linearGradient>
    <linearGradient id="fuel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a261"/>
      <stop offset="100%" style="stop-color:#e76f51"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#f4a261" stroke-width="8"/>
  <!-- Fuel pump body -->
  <rect x="170" y="140" width="120" height="260" rx="20" fill="url(#fuel)"/>
  <!-- Pump display -->
  <rect x="195" y="160" width="70" height="50" rx="8" fill="#1a1a2e"/>
  <text x="230" y="195" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="24">ETB</text>
  <!-- Pump handle -->
  <rect x="280" y="220" width="80" height="35" rx="10" fill="#c0c0c0"/>
  <rect x="340" y="180" width="25" height="90" rx="5" fill="#a0a0a0"/>
  <!-- Nozzle -->
  <rect x="290" y="255" width="60" height="12" rx="6" fill="#888"/>
  <!-- Hose -->
  <path d="M350 290 Q 420 290 420 350 Q 420 400 360 400" fill="none" stroke="#555" stroke-width="14" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="150" y="380" width="160" height="30" rx="8" fill="#2c5364"/>
  <!-- Location pin accent -->
  <path d="M200 100 L230 70 L260 100 L240 100 L240 130 L220 130 L220 100 Z" fill="#e76f51"/>
  <circle cx="230" cy="60" r="12" fill="#f4a261"/>
</svg>
